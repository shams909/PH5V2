<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issues Tracker — Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css" />
</head>


<body class="bg-zinc-950 min-h-screen flex items-center justify-center">

    <div class="w-full max-w-md px-5">
        <div class="bg-zinc-900 border border-zinc-800 rounded-xl p-10">
 <!-- logo + title + subtitle -->
            <div class="text-center mb-8">
                <div
                    class="inline-flex items-center justify-center w-14 h-14 bg-zinc-800 border border-zinc-700 rounded-2xl mb-4">
                    <img src="assets/github-logo.png" alt="GitHub" class="w-9 h-9 object-contain brightness-0 invert" />
                </div>
                <h1 class="text-xl font-bold text-white mb-1">GitHub Issues Tracker</h1>
                <p class="text-sm text-zinc-400">Sign in to manage your issues</p>
            </div>

          <!-- Form -->
            <form id="loginForm" class="flex flex-col gap-4" novalidate>

                <div class="flex flex-col gap-1.5">
                    <label for="username" class="text-sm font-medium text-zinc-300">Username</label>
                    <input type="text" id="username"
                        class="bg-zinc-800 border border-zinc-700 rounded-md text-white text-sm px-3 py-2.5 outline-none focus:border-purple-500"
                        placeholder="Enter Username" />
                    <span class="text-xs text-purple-400">Default: <strong>admin</strong></span>
                </div>

                <div class="flex flex-col gap-1.5">
                    <label for="password" class="text-sm font-medium text-zinc-300">Password</label>
                    <input type="password" id="password"
                        class="bg-zinc-800 border border-zinc-700 rounded-md text-white text-sm px-3 py-2.5 outline-none focus:border-purple-500"
                        placeholder="Enter Password" />
                    <span class="text-xs text-purple-400">Default: <strong>admin123</strong></span>
                </div>

                <!-- Error -->
                <div id="errorMsg"
                    class="hidden bg-red-950 border border-red-900 rounded-md px-3 py-2.5 text-sm text-red-300">
                    ⚠️ <span id="errorText">Invalid username or password.</span>
                </div>

                <!-- Sign In Button -->
                <button type="submit" id="signinBtn"
                    class="mt-1 w-full py-3 bg-purple-600 hover:bg-purple-700 text-white font-semibold rounded-md text-sm flex items-center justify-center gap-2 transition-colors duration-200">
                    <span class="btn-text">Sign In</span>
                    <span id="btnSpinner" class="hidden">
                        <span
                            class="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin inline-block"></span>
                    </span>
                </button>

            </form>


                  <!-- OR Divider -->
            <div class="flex items-center gap-3 my-5 text-xs text-zinc-600">
                <div class="flex-1 h-px bg-zinc-800"></div>
                OR
                <div class="flex-1 h-px bg-zinc-800"></div>
            </div>

            <!-- Demo Credentials Box -->
            <div class="bg-zinc-800 border border-zinc-700 rounded-md p-4 text-center">
                <p class="text-xs text-zinc-400 mb-2 font-medium">Demo Credentials:</p>
                <p class="text-sm text-zinc-300 leading-relaxed"><strong
                        class="text-white font-semibold">Username:</strong> admin</p>
                <p class="text-sm text-zinc-300 leading-relaxed"><strong
                        class="text-white font-semibold">Password:</strong> admin123</p>
            </div>

        </div>
    </div>

    <script src="login.js"></script>
</body>

</html>
