<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitHub Issues Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }
  </style>
</head>

<body class="bg-zinc-950 min-h-screen"></body>

 <!-- navbar -->
  <nav class="bg-zinc-950 border-b border-zinc-800 sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-6 h-[60px] flex items-center justify-between gap-4">

      <!-- logo and name -->
      <div class="flex items-center gap-2.5">
        <img src="assets/github-logo.png" alt="GitHub" class="w-7 h-7 object-contain brightness-0 invert" />
        <span class="text-base font-bold text-zinc-200">GitHub Issues Tracker</span>
      </div>

      <!-- search and button -->
      <div class="flex items-center gap-2.5">
        <div class="relative flex items-center">
          <svg class="absolute left-2.5 text-zinc-500 pointer-events-none" width="13" height="13" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          <input type="search" id="searchInput"
            class="bg-zinc-900 border border-zinc-800 rounded-md text-zinc-200 text-sm pl-8 pr-3 py-2 w-[220px] outline-none focus:border-purple-500"
            placeholder="Search issues..." />
        </div>
        <button id="searchBtn"
          class="bg-purple-600 hover:bg-purple-700 text-white text-sm font-semibold px-4 py-2 rounded-md transition-colors">
          + Search
        </button>
      </div>

    </div>
  </nav>
