<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitHub Issues Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }
  </style>
</head>

<body class="bg-zinc-950 min-h-screen">

 <!-- navbar -->
  <nav class="bg-zinc-950 border-b border-zinc-800 sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-6 h-[60px] flex items-center justify-between gap-4">

      <!-- logo and name -->
      <div class="flex items-center gap-2.5">
        <img src="assets/github-logo.png" alt="GitHub" class="w-7 h-7 object-contain brightness-0 invert" />
        <span class="text-base font-bold text-zinc-200">GitHub Issues Tracker</span>
      </div>

      <!-- search and button -->
      <div class="flex items-center gap-2.5">
        <div class="relative flex items-center">
          <svg class="absolute left-2.5 text-zinc-500 pointer-events-none" width="13" height="13" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          <input type="search" id="searchInput"
            class="bg-zinc-900 border border-zinc-800 rounded-md text-zinc-200 text-sm pl-8 pr-3 py-2 w-[220px] outline-none focus:border-purple-500"
            placeholder="Search issues..." />
        </div>
        <button id="searchBtn"
          class="bg-purple-600 hover:bg-purple-700 text-white text-sm font-semibold px-4 py-2 rounded-md transition-colors">
          + Search
        </button>
      </div>

    </div>
  </nav>


   <!-- main -->
  <main class="max-w-6xl mx-auto px-6 py-7 pb-16">

    <!-- tab buttons -->
    <div class="mb-5">
      <div class="inline-flex border border-zinc-700 rounded-md overflow-hidden bg-zinc-900">
        <button
          class="tab-btn px-5 py-2 text-sm font-semibold text-white bg-purple-600 border-r border-zinc-700 transition-colors"
          id="tabAll" data-filter="all" onclick="switchTab('all')">All</button>
        <button
          class="tab-btn px-5 py-2 text-sm font-medium text-zinc-400 hover:bg-zinc-800 hover:text-zinc-200 border-r border-zinc-700 transition-colors"
          id="tabOpen" data-filter="open" onclick="switchTab('open')">Open</button>
        <button
          class="tab-btn px-5 py-2 text-sm font-medium text-zinc-400 hover:bg-zinc-800 hover:text-zinc-200 transition-colors"
          id="tabClosed" data-filter="closed" onclick="switchTab('closed')">Closed</button>
      </div>
    </div>


    <!-- issue counter box -->

    <!-- Issues Count Box -->
    <div
      class="flex items-center justify-between bg-zinc-900 border border-zinc-800 rounded-xl px-5 py-4 mb-5 flex-wrap gap-3">
      <div class="flex items-center gap-3.5">
        <img src="assets/Aperture.png" alt="Issues" class="w-10 h-10 object-contain" />
        <div>
          <h2 id="issueCountHeading" class="text-xl font-bold text-white">-- Issues</h2>
          <p class="text-xs text-zinc-500 mt-0.5">Track and manage your project issues</p>
        </div>
      </div>
      <div class="flex items-center gap-4">
        <span class="flex items-center gap-1.5 text-sm font-medium text-emerald-400">
          <span class="w-2 h-2 rounded-full bg-emerald-500 inline-block"></span> Open
        </span>
        <span class="flex items-center gap-1.5 text-sm font-medium text-purple-400">
          <span class="w-2 h-2 rounded-full bg-purple-600 inline-block"></span> Closed
        </span>
      </div>
    </div>

<!-- loading spinner -->
    <div id="loadingSpinner" class="flex flex-col items-center justify-center gap-3.5 py-20 text-zinc-500 text-sm">
      <div class="w-10 h-10 border-[3px] border-zinc-700 border-t-purple-600 rounded-full animate-spin"></div>
      <p>Loading issues...</p>
    </div>


    <!-- empty state -->
    <div id="emptyState" class="hidden text-center py-20 text-zinc-500 text-sm">
      <p id="emptyStateText">No issues found.</p>
    </div>

    <!-- issues grids -->
    <div id="issuesGrid" class="hidden grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-4"></div>

  </main>

  
  <!-- js modeal -->
  <div id="issueModal" class="fixed inset-0 bg-black/75 z-[100] flex items-center justify-center p-5 hidden"
    onclick="closeModalOutside(event)">
    <div
      class="bg-zinc-900 border border-zinc-800 rounded-xl w-full max-w-[580px] max-h-[90vh] overflow-y-auto relative">

      <!-- close buttonx  -->
      <button onclick="closeModal()"
        class="absolute top-3.5 right-3.5 w-8 h-8 bg-zinc-800 border border-zinc-700 rounded-md text-zinc-400 hover:text-white hover:bg-zinc-700 flex items-center justify-center text-sm transition-colors z-10">✕</button>

      <!-- spinner -->
      <div id="modalLoadingSpinner" class="hidden flex justify-center p-12">
        <div class="w-8 h-8 border-[3px] border-zinc-700 border-t-purple-600 rounded-full animate-spin"></div>
      </div>

      <!-- content of modal filtered by js -->
      <div id="modalContent" class="p-7"></div>

    </div>
  </div>

  <script src="main.js"></script>
</body>

</html>
